name: 验证前端自动化部署

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 打包项目
        run: pnpm run build

      - name: 安装阿里云 OSS 工具
        uses: manyuanrong/setup-ossutil@v2.0
        with:
          endpoint: oss-cn-beijing.aliyuncs.com
          access-key-id: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}

      - name: 一键同步产物到 OSS
        env:
          OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
        run: |
          if [ -z "$OSS_BUCKET" ]; then
            echo "请在仓库 Settings → Secrets 中配置 OSS_BUCKET（仅填 bucket 名称，不含 oss://）"
            exit 1
          fi
          ossutil cp -r -u --force dist/ "oss://${OSS_BUCKET}/"
