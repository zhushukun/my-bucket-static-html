name: 前端自动化部署（腾讯云COS）

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 干掉Node24警告

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 打包项目
        run: pnpm run build

      # 最稳的 COS 上传方式（不会出现 [object Object] 错误）
      - name: 安装腾讯云 COS 工具
        run: sudo pip install coscmd

      - name: 配置 COS
        run: |
          coscmd config -a ${{ secrets.TENCENT_SECRET_ID }} \
                         -s ${{ secrets.TENCENT_SECRET_KEY }} \
                         -b ${{ secrets.TENCENT_COS_BUCKET }} \
                         -r ap-beijing

      - name: 上传 dist 到 COS
        run: coscmd upload -r dist/ /
